    /* ── Blog post page styles ──────────────────────────────────── */

    /* Back bar */
    .back-bar {
      padding: calc(var(--nav-height) + 24px) 0 0;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text);
      opacity: 0.55;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .back-link:hover { opacity: 1; }

    /* Post header */
    .post-header {
      padding: 40px 0 56px;
      border-bottom: 1px solid var(--color-border);
    }

    .post-category {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #CC1F28;
      margin-bottom: 16px;
      font-family: var(--font-body);
    }

    .post-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 52px);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.1;
      max-width: 720px;
      margin-bottom: 20px;
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
      color: var(--color-text-muted);
    }

    .post-meta-divider {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--color-text-muted);
      opacity: 0.4;
    }

    /* Hero image */
    .post-hero-img {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      object-position: center;
      margin: 56px 0;
      display: block;
    }

    /* Post body — constrained width for readability */
    .post-body-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 0 96px;
    }

    .post-body {
      font-size: 17px;
      line-height: 1.75;
      color: var(--color-text);
    }

    /* Markdown rendered content styles */
    .post-body h1,
    .post-body h2,
    .post-body h3,
    .post-body h4 {
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.2;
      margin-top: 2em;
      margin-bottom: 0.6em;
      color: var(--color-text);
    }

    .post-body h2 { font-size: clamp(22px, 2.2vw, 32px); }
    .post-body h3 { font-size: clamp(18px, 1.8vw, 24px); }
    .post-body h4 { font-size: 18px; }

    .post-body p {
      margin-bottom: 1.4em;
    }

    .post-body ul,
    .post-body ol {
      padding-left: 1.5em;
      margin-bottom: 1.4em;
    }

    .post-body ul { list-style: disc; }
    .post-body ol { list-style: decimal; }

    .post-body li {
      margin-bottom: 0.5em;
    }

    .post-body a {
      color: var(--color-text);
      text-decoration: underline;
      text-underline-offset: 3px;
      opacity: 0.7;
      transition: opacity 0.2s ease;
    }

    .post-body a:hover { opacity: 1; }

    .post-body blockquote {
      border-left: 3px solid #CC1F28;
      padding: 12px 20px;
      margin: 2em 0;
      color: var(--color-text-muted);
      font-size: 18px;
      font-style: italic;
    }

    .post-body img {
      width: 100%;
      height: auto;
      margin: 2em 0;
    }

    .post-body code {
      font-size: 14px;
      background: var(--color-bg-grey);
      padding: 2px 6px;
      border-radius: 3px;
    }

    .post-body pre {
      background: var(--color-bg-grey);
      padding: 20px;
      overflow-x: auto;
      margin-bottom: 1.4em;
    }

    .post-body pre code {
      background: none;
      padding: 0;
    }

    .post-body hr {
      border: none;
      border-top: 1px solid var(--color-border);
      margin: 2.5em 0;
    }

    .post-body strong { font-weight: 600; }

    /* Error / loading states */
    .post-error,
    .post-loading {
      text-align: center;
      padding: 80px 0;
    }

    .post-error h2 {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .post-error p {
      font-size: 15px;
      color: var(--color-text-muted);
      margin-bottom: 24px;
    }

    .post-loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--color-border);
      border-top-color: var(--color-text);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .post-body-wrap { padding: 40px 0 64px; }
      .post-body { font-size: 16px; }
      .post-hero-img { margin: 32px 0; }
    }
  </style>

  <script src="../js/main.js"></script>
  <script>
    /* ── Blog post: fetch markdown, parse frontmatter, render ─── */
    (function () {
      'use strict';

      const postContent = document.getElementById('postContent');

      /* Get ?slug= from URL */
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      if (!slug) {
        showError('Post not found', 'No article was specified.');
        return;
      }

      /* Parse YAML-ish frontmatter from markdown string */
      function parseFrontmatter(raw) {
        const match = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
        if (!match) return { meta: {}, body: raw };
        const yamlStr = match[1];
        const body = match[2];
        const meta = {};

        yamlStr.split('\n').forEach(line => {
          const colonIdx = line.indexOf(':');
          if (colonIdx === -1) return;
          const key = line.slice(0, colonIdx).trim();
          let val = line.slice(colonIdx + 1).trim().replace(/^["']|["']$/g, '');
          if (key) meta[key] = val;
        });

        /* Handle nested seo block */
        const seoMatch = yamlStr.match(/seo:\s*\n((?:\s{2,}.+\n?)*)/);
        if (seoMatch) {
          meta.seo = {};
          seoMatch[1].split('\n').forEach(line => {
            const m = line.match(/^\s{2,}(\w+):\s*(.*)/);
            if (m) meta.seo[m[1].trim()] = m[2].trim().replace(/^["']|["']$/g, '');
          });
        }

        return { meta, body };
      }

      /* Format date */
      function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        if (isNaN(d)) return dateStr;
        return d.toLocaleDateString('en-SG', { day: 'numeric', month: 'long', year: 'numeric' });
      }

      /* Set SEO meta tags */
      function applyMeta(meta) {
        const seo = meta.seo || {};
        const title = seo.meta_title || meta.title || 'Blog – mypropfolio';
        const desc = seo.meta_description || meta.description || '';
        const canonical = seo.canonical || ('https://mypropfolio.co/blog/post.html?slug=' + encodeURIComponent(slug));
        const ogImg = seo.og_image || meta.thumbnail || '';
        const ogTitle = seo.meta_title || meta.title || title;

        document.title = title;
        document.getElementById('pageTitle').textContent = title;
        document.getElementById('pageDesc').setAttribute('content', desc);
        document.getElementById('pageCanonical').setAttribute('href', canonical);
        document.getElementById('ogTitle').setAttribute('content', ogTitle);
        document.getElementById('ogDesc').setAttribute('content', desc);
        document.getElementById('ogUrl').setAttribute('content', canonical);
        if (ogImg) document.getElementById('ogImage').setAttribute('content', ogImg);
      }

      /* Render the post */
      function renderPost(meta, bodyMarkdown) {
        applyMeta(meta);

        const category = meta.category || '';
        const dateStr = formatDate(meta.date);
        const author = meta.author || 'mypropfolio';
        const thumb = meta.thumbnail || '';

        const thumbResolve = (src) => {
          if (!src) return '';
          if (src.startsWith('http')) return src;
          if (src.startsWith('/Asset/')) return '..' + src;
          return src;
        };

        /* Wait for marked.js to load, then render markdown */
        function doRender() {
          if (typeof marked === 'undefined') {
            setTimeout(doRender, 50);
            return;
          }

          const html = marked.parse(bodyMarkdown);

          postContent.innerHTML = `
            <div class="container">
              <header class="post-header">
                ${category ? `<p class="post-category">${category}</p>` : ''}
                <h1 class="post-title">${meta.title || 'Untitled'}</h1>
                <div class="post-meta">
                  ${dateStr ? `<time datetime="${meta.date || ''}">${dateStr}</time>` : ''}
                  ${dateStr && author ? `<span class="post-meta-divider" aria-hidden="true"></span>` : ''}
                  ${author ? `<span>By ${author}</span>` : ''}
                </div>
              </header>

              ${thumb ? `<img src="${thumbResolve(thumb)}" alt="${meta.title || ''}" class="post-hero-img" loading="eager">` : ''}

              <div class="post-body-wrap">
                <article class="post-body">
                  ${html}
                </article>
              </div>
            </div>`;
        }

        doRender();
      }

      function showError(heading, message) {
        postContent.innerHTML = `
          <div class="container">
            <div class="post-error">
              <h2>${heading}</h2>
              <p>${message}</p>
              <a href="index.html" class="btn-primary">Back to Blog</a>
            </div>
          </div>`;
      }

      /* Fetch the markdown file */
      fetch(encodeURIComponent(slug) + '.md')
        .then(res => {
          if (!res.ok) throw new Error('Post not found');
          return res.text();
        })
        .then(raw => {
          const { meta, body } = parseFrontmatter(raw);
          renderPost(meta, body);
        })
        .catch(() => {
          showError('Article not found', 'This article may have moved or been removed.');
        });

    }());
  </script>
